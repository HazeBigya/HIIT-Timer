<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HIIT Timer favicon">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="ring" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8" />
      <stop offset="0.5" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="18" fill="url(#bg)" />
  <rect x="5" y="5" width="54" height="54" rx="17" fill="none" stroke="rgba(255,255,255,0.10)" />

  <circle cx="32" cy="32" r="17" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="6" />
  <path
    d="M32 15a17 17 0 1 1-12.02 4.98"
    fill="none"
    stroke="url(#ring)"
    stroke-width="6"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <path
    d="M31 19.5c0-1.1 1.2-1.8 2.15-1.2l10.5 6.15c0.95 0.56 0.95 1.84 0 2.4l-10.5 6.15c-0.95 0.56-2.15-0.1-2.15-1.2v-12.3Z"
    fill="#f8fafc"
  />

  <circle cx="20.5" cy="20" r="2.5" fill="#38bdf8" opacity="0.95" />
</svg>